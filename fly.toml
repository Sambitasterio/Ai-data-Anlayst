# fly.toml app configuration file generated for ai-data-analyst-sambit on 2026-05-09T19:26:02+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-data-analyst-sambit'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  AUTOLOAD_DEMO_SAMPLE = '1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
